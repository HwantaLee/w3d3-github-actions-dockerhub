<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">플랫폼별 권한 제어와 책임 범위</title>
  <desc id="desc">IaaS, PaaS, Managed Service, SaaS의 제어권과 운영 부담, 주요 권한 결정 지점을 비교하는 교육용 다이어그램</desc>
  <rect width="1600" height="900" fill="#f8fafc"/>
  <text x="800" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="46" font-weight="700" fill="#111827">플랫폼별 권한 제어와 책임 범위</text>
  <text x="800" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#475569">왼쪽으로 갈수록 제어권과 운영 부담이 커지고, 오른쪽으로 갈수록 사용은 쉬워지지만 내부 제어권은 줄어든다.</text>

  <defs>
    <linearGradient id="axis" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="35%" stop-color="#d97706"/>
      <stop offset="68%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.15"/>
    </filter>
  </defs>

  <text x="90" y="165" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#dc2626">제어권 높음</text>
  <text x="90" y="198" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#dc2626">운영 부담 높음</text>
  <text x="1365" y="165" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#2563eb">제어권 낮음</text>
  <text x="1365" y="198" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#2563eb">운영 부담 낮음</text>
  <rect x="220" y="175" width="1160" height="18" rx="9" fill="url(#axis)"/>
  <polygon points="205,184 240,160 240,208" fill="#dc2626"/>
  <polygon points="1395,184 1360,160 1360,208" fill="#2563eb"/>

  <g font-family="Arial, sans-serif" filter="url(#shadow)">
    <rect x="80" y="245" width="330" height="500" rx="18" fill="#ffffff" stroke="#fecaca" stroke-width="2"/>
    <rect x="95" y="265" width="300" height="64" rx="14" fill="#dc2626"/>
    <text x="245" y="307" text-anchor="middle" font-size="34" font-weight="700" fill="#ffffff">IaaS</text>
    <text x="245" y="360" text-anchor="middle" font-size="21" font-weight="700" fill="#991b1b">가상 서버와 인프라를 빌려 직접 운영</text>
    <text x="115" y="410" font-size="22" font-weight="700" fill="#111827">내가 결정하는 권한</text>
    <text x="125" y="450" font-size="20" fill="#334155">- OS 계정과 SSH key</text>
    <text x="125" y="485" font-size="20" fill="#334155">- 방화벽, 보안 그룹, 포트</text>
    <text x="125" y="520" font-size="20" fill="#334155">- 패치, 런타임, 로그 수집</text>
    <text x="125" y="555" font-size="20" fill="#334155">- 백업과 복구 절차</text>
    <rect x="110" y="600" width="270" height="95" rx="12" fill="#fef2f2"/>
    <text x="245" y="635" text-anchor="middle" font-size="20" font-weight="700" fill="#991b1b">주의</text>
    <text x="245" y="668" text-anchor="middle" font-size="18" fill="#7f1d1d">자유도가 큰 만큼</text>
    <text x="245" y="696" text-anchor="middle" font-size="18" fill="#7f1d1d">운영 책임도 가장 크다.</text>

    <rect x="455" y="245" width="330" height="500" rx="18" fill="#ffffff" stroke="#fed7aa" stroke-width="2"/>
    <rect x="470" y="265" width="300" height="64" rx="14" fill="#d97706"/>
    <text x="620" y="307" text-anchor="middle" font-size="34" font-weight="700" fill="#ffffff">PaaS</text>
    <text x="620" y="360" text-anchor="middle" font-size="21" font-weight="700" fill="#92400e">앱을 올리는 플랫폼에 집중</text>
    <text x="490" y="410" font-size="22" font-weight="700" fill="#111827">내가 결정하는 권한</text>
    <text x="500" y="450" font-size="20" fill="#334155">- 배포 권한과 승인 흐름</text>
    <text x="500" y="485" font-size="20" fill="#334155">- 환경변수와 secret 주입</text>
    <text x="500" y="520" font-size="20" fill="#334155">- 플랫폼 IAM 역할</text>
    <text x="500" y="555" font-size="20" fill="#334155">- health check와 로그 설정</text>
    <rect x="485" y="600" width="270" height="95" rx="12" fill="#fff7ed"/>
    <text x="620" y="635" text-anchor="middle" font-size="20" font-weight="700" fill="#92400e">주의</text>
    <text x="620" y="668" text-anchor="middle" font-size="18" fill="#7c2d12">빠르지만 플랫폼 제약과</text>
    <text x="620" y="696" text-anchor="middle" font-size="18" fill="#7c2d12">과금 구조를 확인한다.</text>

    <rect x="830" y="245" width="330" height="500" rx="18" fill="#ffffff" stroke="#bbf7d0" stroke-width="2"/>
    <rect x="845" y="265" width="300" height="64" rx="14" fill="#16a34a"/>
    <text x="995" y="307" text-anchor="middle" font-size="30" font-weight="700" fill="#ffffff">Managed Service</text>
    <text x="995" y="360" text-anchor="middle" font-size="21" font-weight="700" fill="#166534">특정 운영 기능을 위임</text>
    <text x="865" y="410" font-size="22" font-weight="700" fill="#111827">내가 결정하는 권한</text>
    <text x="875" y="450" font-size="20" fill="#334155">- 공개 접근과 네트워크 경로</text>
    <text x="875" y="485" font-size="20" fill="#334155">- 백업, 암호화, 보관 기간</text>
    <text x="875" y="520" font-size="20" fill="#334155">- 서비스 접근 정책</text>
    <text x="875" y="555" font-size="20" fill="#334155">- 인스턴스 크기와 옵션</text>
    <rect x="860" y="600" width="270" height="95" rx="12" fill="#f0fdf4"/>
    <text x="995" y="635" text-anchor="middle" font-size="20" font-weight="700" fill="#166534">주의</text>
    <text x="995" y="668" text-anchor="middle" font-size="18" fill="#14532d">운영 부담은 줄지만</text>
    <text x="995" y="696" text-anchor="middle" font-size="18" fill="#14532d">데이터 책임은 남는다.</text>

    <rect x="1205" y="245" width="330" height="500" rx="18" fill="#ffffff" stroke="#bfdbfe" stroke-width="2"/>
    <rect x="1220" y="265" width="300" height="64" rx="14" fill="#2563eb"/>
    <text x="1370" y="307" text-anchor="middle" font-size="34" font-weight="700" fill="#ffffff">SaaS</text>
    <text x="1370" y="360" text-anchor="middle" font-size="21" font-weight="700" fill="#1d4ed8">완성된 소프트웨어 사용</text>
    <text x="1240" y="410" font-size="22" font-weight="700" fill="#111827">내가 결정하는 권한</text>
    <text x="1250" y="450" font-size="20" fill="#334155">- 사용자 계정과 역할</text>
    <text x="1250" y="485" font-size="20" fill="#334155">- 공유 링크와 외부 초대</text>
    <text x="1250" y="520" font-size="20" fill="#334155">- 데이터 export와 보관</text>
    <text x="1250" y="555" font-size="20" fill="#334155">- 결제 플랜과 감사 로그</text>
    <rect x="1235" y="600" width="270" height="95" rx="12" fill="#eff6ff"/>
    <text x="1370" y="635" text-anchor="middle" font-size="20" font-weight="700" fill="#1d4ed8">주의</text>
    <text x="1370" y="668" text-anchor="middle" font-size="18" fill="#1e3a8a">서버는 안 보이지만</text>
    <text x="1370" y="696" text-anchor="middle" font-size="18" fill="#1e3a8a">계정과 데이터는 책임진다.</text>
  </g>

  <rect x="115" y="790" width="1370" height="62" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="800" y="828" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#0f172a">공통 체크: 최소 권한, Secret 보호, 비용 한도, 공식 문서 확인</text>
</svg>
