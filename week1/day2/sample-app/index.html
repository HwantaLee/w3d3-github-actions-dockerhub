<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Week 1 Day 2 Local Server Lab</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;

      main {
