services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: paperclip/week2-day5-integration:local
    ports:
      - "${WEB_PORT:-18085}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: "no"

