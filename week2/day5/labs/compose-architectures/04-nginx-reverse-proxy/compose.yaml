services:
  proxy:
    image: nginx:1.27-alpine
    ports:
      - "18089:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web-a
      - web-b

  web-a:
    image: nginx:1.27-alpine
    volumes:
      - ./web-a:/usr/share/nginx/html:ro

  web-b:
    image: nginx:1.27-alpine
    volumes:
      - ./web-b:/usr/share/nginx/html:ro
