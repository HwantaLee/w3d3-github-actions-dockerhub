<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Week 2 Day 4 Compose Site</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f8fb;
        color: #182033;
      }
      main {
        max-width: 780px;
        margin: 0 auto;
        padding: 56px 24px;
      }
      .badge {
        display: inline-block;
        padding: 6px 10px;
        border-radius: 6px;
        background: #e7f1ff;
        color: #174a8b;
        font-weight: 700;
      }
      h1 {
        font-size: 34px;
        margin: 20px 0 12px;
      }
      p {
        font-size: 18px;
        line-height: 1.65;
      }
      code {
        background: #e9eef5;
        padding: 2px 5px;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <main>
      <span class="badge">compose-site v1</span>
      <h1>Day 4는 Compose로 실행 조건을 파일화합니다</h1>
      <p>
        이 페이지는 <code>web</code> service가 제공하고, 같은 Compose project 안의
        <code>db</code> service는 service name으로 접근합니다.
      </p>
      <p>정상 확인 문구: <code>compose-site-v1</code></p>
    </main>
  </body>
</html>
