<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="780" viewBox="0 0 1200 780" role="img" aria-labelledby="title desc">
  <title id="title">Session 09 3-tier Docker architecture</title>
  <desc id="desc">Host connects to frontend through port 18090. Frontend and backend share the front network. Backend and PostgreSQL share the back network. Frontend cannot reach PostgreSQL directly. PostgreSQL data is stored in a named volume.</desc>
  <defs>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#1f7a4d"/>
    </marker>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#255f99"/>
    </marker>
    <marker id="arrow-red" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#b42318"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1f2937" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: #f7f9fc; }
      .panel { fill: #ffffff; stroke: #d8e0eb; stroke-width: 2; filter: url(#shadow); }
      .net-front { fill: #e9f4ff; stroke: #6aa6df; stroke-width: 2; }
      .net-back { fill: #ecf7ef; stroke: #65aa78; stroke-width: 2; }
      .box { fill: #ffffff; stroke: #243b53; stroke-width: 2.5; filter: url(#shadow); }
      .db { fill: #fff8e8; stroke: #b7791f; stroke-width: 2.5; filter: url(#shadow); }
      .volume { fill: #f5edff; stroke: #7653b7; stroke-width: 2.5; filter: url(#shadow); }
      .title { font: 700 34px Arial, sans-serif; fill: #17202a; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #4b5563; }
      .label { font: 700 22px Arial, sans-serif; fill: #17202a; }
      .small { font: 400 16px Arial, sans-serif; fill: #344054; }
      .tiny { font: 400 14px Arial, sans-serif; fill: #4b5563; }
      .net-label { font: 700 18px Arial, sans-serif; fill: #17324d; }
      .allowed { stroke: #1f7a4d; stroke-width: 5; fill: none; marker-end: url(#arrow-green); }
      .proxy { stroke: #255f99; stroke-width: 5; fill: none; marker-end: url(#arrow-blue); }
      .blocked { stroke: #b42318; stroke-width: 4; fill: none; stroke-dasharray: 12 10; marker-end: url(#arrow-red); }
      .mount { stroke: #7653b7; stroke-width: 5; fill: none; marker-end: url(#arrow-blue); }
      .badge-ok { fill: #dcfae6; stroke: #039855; }
      .badge-no { fill: #fee4e2; stroke: #d92d20; }
      .badge-text { font: 700 14px Arial, sans-serif; fill: #17202a; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="780"/>
  <text x="60" y="60" class="title">Session 09 Challenge: 3-Tier Docker Runtime</text>
  <text x="60" y="92" class="subtitle">그림만 보고 허용 경로, 차단 경로, named volume 위치를 설명할 수 있어야 한다.</text>

  <rect x="40" y="130" width="1120" height="500" rx="18" class="panel"/>
  <rect x="280" y="160" width="340" height="430" rx="16" class="net-front"/>
  <rect x="610" y="160" width="360" height="430" rx="16" class="net-back"/>
  <text x="305" y="192" class="net-label">paperclip-weekend-front-net</text>
  <text x="638" y="192" class="net-label">paperclip-weekend-back-net</text>

  <rect x="70" y="290" width="170" height="110" rx="12" class="box"/>
  <text x="106" y="330" class="label">Host</text>
  <text x="92" y="360" class="small">browser / curl</text>
  <text x="88" y="384" class="tiny">localhost:18090</text>

  <rect x="335" y="285" width="220" height="130" rx="12" class="box"/>
  <text x="373" y="322" class="label">Frontend</text>
  <text x="365" y="352" class="small">nginx container</text>
  <text x="354" y="376" class="tiny">index.html + styles.css</text>
  <text x="370" y="398" class="tiny">/api -&gt; backend proxy</text>

  <rect x="660" y="285" width="230" height="130" rx="12" class="box"/>
  <text x="703" y="322" class="label">Backend</text>
  <text x="693" y="352" class="small">Node.js container</text>
  <text x="700" y="376" class="tiny">hello world API</text>
  <text x="704" y="398" class="tiny">DB_HOST=paperclip-weekend-db</text>

  <rect x="660" y="455" width="230" height="105" rx="12" class="db"/>
  <text x="714" y="492" class="label">Database</text>
  <text x="704" y="522" class="small">postgres:16</text>
  <text x="713" y="545" class="tiny">container port 5432</text>

  <rect x="955" y="455" width="175" height="105" rx="12" class="volume"/>
  <text x="990" y="492" class="label">Volume</text>
  <text x="980" y="522" class="small">named volume</text>
  <text x="969" y="545" class="tiny">paperclip-weekend-pgdata</text>

  <path d="M240 345 C270 345 292 345 327 345" class="allowed"/>
  <text x="238" y="326" class="tiny">allowed: -p 18090:80</text>

  <path d="M555 345 C595 345 620 345 652 345" class="proxy"/>
  <text x="555" y="326" class="tiny">allowed: frontend -&gt; backend</text>

  <path d="M775 415 C775 430 775 438 775 448" class="allowed"/>
  <text x="793" y="437" class="tiny">allowed: backend -&gt; db</text>

  <path d="M890 508 C910 508 930 508 947 508" class="mount"/>
  <text x="900" y="492" class="tiny">mount</text>

  <path d="M445 420 C445 565 585 610 664 548" class="blocked"/>
  <text x="352" y="564" class="tiny">blocked: frontend -X-&gt; database</text>

  <path d="M155 404 C190 575 495 650 670 560" class="blocked"/>
  <text x="94" y="590" class="tiny">blocked: host -X-&gt; db port, no -p 5432</text>

  <rect x="80" y="650" width="240" height="40" rx="20" class="badge-ok"/>
  <text x="105" y="676" class="badge-text">PASS: frontend -&gt; backend ping/HTTP</text>
  <rect x="350" y="650" width="230" height="40" rx="20" class="badge-ok"/>
  <text x="376" y="676" class="badge-text">PASS: backend -&gt; db ping/5432</text>
  <rect x="610" y="650" width="230" height="40" rx="20" class="badge-no"/>
  <text x="636" y="676" class="badge-text">FAIL EXPECTED: frontend -&gt; db</text>
  <rect x="870" y="650" width="245" height="40" rx="20" class="badge-ok"/>
  <text x="895" y="676" class="badge-text">PASS: volume keeps PostgreSQL data</text>

  <text x="60" y="735" class="subtitle">제출 증거: docker network inspect, docker exec ping/wget/nc, docker logs, docker volume inspect, build size/time table</text>
</svg>
